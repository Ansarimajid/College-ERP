{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-8 offset-md-2">

        {% if messages %}
          {% for m in messages %}
          <div class="alert alert-{{ m.tags|default:'info' }} alert-dismissible">
            {{ m }} <button type="button" class="close" data-dismiss="alert">&times;</button>
          </div>
          {% endfor %}
        {% endif %}

        <div class="card card-dark">
          <div class="card-header">
            <h3 class="card-title">{{ page_title }}</h3>
          </div>
          <form method="POST" id="result_form">
            {% csrf_token %}
            <div class="card-body">

              <div class="form-group">
                <label><i class="fas fa-layer-group mr-1"></i> Select Group</label>
                <select id="group_select" name="group" class="form-control" required>
                  <option value="">— Choose a group —</option>
                  {% for g in groups %}
                  <option value="{{ g.id }}">{{ g.name }}{% if g.course %} · {{ g.course.name }}{% endif %}</option>
                  {% endfor %}
                </select>
              </div>

              <button type="button" id="fetch_students_btn" class="btn btn-primary btn-block">
                <i class="fas fa-users mr-1"></i> Load Students
              </button>

              <div id="student_section" style="display:none;" class="mt-3">
                <div class="form-group">
                  <label><i class="fas fa-user-graduate mr-1"></i> Student</label>
                  <select id="student_list" name="student_list" class="form-control" required></select>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label>Test Score <small class="text-muted">(0–40)</small></label>
                      <input type="number" name="test" id="test_score" class="form-control"
                             min="0" max="40" step="0.5" placeholder="e.g. 35" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label>Exam Score <small class="text-muted">(0–60)</small></label>
                      <input type="number" name="exam" id="exam_score" class="form-control"
                             min="0" max="60" step="0.5" placeholder="e.g. 50" required>
                    </div>
                  </div>
                </div>

                <div id="existing_scores" class="alert alert-info" style="display:none;"></div>

              </div>
            </div><!-- /.card-body -->

            <div id="save_section" style="display:none;" class="card-footer">
              <button type="submit" class="btn btn-success btn-block">
                <i class="fas fa-save mr-1"></i> Save Scores
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block custom_js %}
<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';

document.getElementById('fetch_students_btn').addEventListener('click', function () {
  const group = document.getElementById('group_select').value;
  if (!group) { alert('Please select a group first.'); return; }

  fetch("{% url 'get_students' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group })
  })
  .then(r => r.json())
  .then(data => {
    const arr = JSON.parse(data);
    if (!arr.length) { alert('No enrolled students in this group.'); return; }
    const sel = document.getElementById('student_list');
    sel.innerHTML = arr.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('student_section').style.display = 'block';
    document.getElementById('save_section').style.display = 'block';
    loadExistingScores();
  })
  .catch(() => alert('Error loading students.'));
});

function loadExistingScores() {
  const group   = document.getElementById('group_select').value;
  const student = document.getElementById('student_list').value;
  if (!group || !student) return;

  fetch("{% url 'fetch_student_result' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group, student })
  })
  .then(r => r.text())
  .then(resp => {
    const box = document.getElementById('existing_scores');
    if (resp === 'False') {
      box.style.display = 'none';
      document.getElementById('test_score').value = '';
      document.getElementById('exam_score').value = '';
    } else {
      const data = JSON.parse(resp);
      document.getElementById('test_score').value = data.test;
      document.getElementById('exam_score').value = data.exam;
      box.textContent = `Existing scores loaded — Test: ${data.test}, Exam: ${data.exam}. Edit and save to update.`;
      box.style.display = 'block';
    }
  });
}

document.getElementById('student_list').addEventListener('change', loadExistingScores);
</script>
{% endblock %}
