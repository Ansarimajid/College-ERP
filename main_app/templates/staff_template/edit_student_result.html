{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-8 offset-md-2">

        {% if messages %}
          {% for m in messages %}
          <div class="alert alert-{{ m.tags|default:'info' }} alert-dismissible">
            {{ m }} <button type="button" class="close" data-dismiss="alert">&times;</button>
          </div>
          {% endfor %}
        {% endif %}

        <div class="card card-dark">
          <div class="card-header">
            <h3 class="card-title">{{ page_title }}</h3>
          </div>
          <div class="card-body">

            <div class="form-group">
              <label><i class="fas fa-layer-group mr-1"></i> Select Group</label>
              <select id="group_select" class="form-control">
                <option value="">— Choose a group —</option>
                {% for g in groups %}
                <option value="{{ g.id }}">{{ g.name }}</option>
                {% endfor %}
              </select>
            </div>

            <button type="button" id="fetch_students_btn" class="btn btn-primary btn-block">
              <i class="fas fa-users mr-1"></i> Load Students
            </button>

            <div id="student_section" class="mt-3" style="display:none;">
              <div class="form-group">
                <label><i class="fas fa-user-graduate mr-1"></i> Student</label>
                <select id="student_select" class="form-control">
                  <option value="">— Select student —</option>
                </select>
              </div>
            </div>

            <div id="score_section" class="mt-3" style="display:none;">
              <div id="existing_info" class="alert alert-info" style="display:none;"></div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Test Score <small class="text-muted">(0–40)</small></label>
                    <input type="number" id="test_score" class="form-control" min="0" max="40" step="0.5" placeholder="e.g. 35">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Exam Score <small class="text-muted">(0–60)</small></label>
                    <input type="number" id="exam_score" class="form-control" min="0" max="60" step="0.5" placeholder="e.g. 50">
                  </div>
                </div>
              </div>
              <button type="button" id="save_btn" class="btn btn-success btn-block">
                <i class="fas fa-save mr-1"></i> Update Result
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block custom_js %}
<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';

document.getElementById('fetch_students_btn').addEventListener('click', function () {
  const group = document.getElementById('group_select').value;
  if (!group) { alert('Please select a group first.'); return; }

  fetch("{% url 'get_students' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group })
  })
  .then(r => r.json())
  .then(data => {
    const arr = JSON.parse(data);
    if (!arr.length) { alert('No students enrolled in this group.'); return; }
    const sel = document.getElementById('student_select');
    sel.innerHTML = '<option value="">— Select student —</option>' +
      arr.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('student_section').style.display = 'block';
    document.getElementById('score_section').style.display = 'none';
  })
  .catch(() => alert('Error loading students.'));
});

document.getElementById('student_select').addEventListener('change', function () {
  const student = this.value;
  const group = document.getElementById('group_select').value;
  if (!student || !group) return;

  fetch("{% url 'fetch_student_result' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group, student })
  })
  .then(r => r.text())
  .then(resp => {
    const box = document.getElementById('existing_info');
    if (resp === 'False') {
      box.style.display = 'none';
      document.getElementById('test_score').value = '';
      document.getElementById('exam_score').value = '';
      alert('No existing result for this student in this group.');
      document.getElementById('score_section').style.display = 'none';
    } else {
      const d = JSON.parse(resp);
      document.getElementById('test_score').value = d.test;
      document.getElementById('exam_score').value = d.exam;
      box.textContent = `Current scores — Test: ${d.test}, Exam: ${d.exam}. Edit the fields and save.`;
      box.style.display = 'block';
      document.getElementById('score_section').style.display = 'block';
    }
  });
});

document.getElementById('save_btn').addEventListener('click', function () {
  const group   = document.getElementById('group_select').value;
  const student = document.getElementById('student_select').value;
  const test    = document.getElementById('test_score').value;
  const exam    = document.getElementById('exam_score').value;
  if (!group || !student) { alert('Please select group and student.'); return; }

  fetch("{% url 'edit_student_result' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group, student, test, exam })
  })
  .then(r => r.text())
  .then(() => {
    location.reload();
  })
  .catch(() => alert('Error saving result.'));
});
</script>
{% endblock %}
